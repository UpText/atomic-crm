name: 🌐 Deploy SQLWebAPI Pages

on:
  push:
    branches:
      - sqlwebapi
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: 🔨 Build SQLWebAPI site
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      VITE_SQLWEBAPI_URL: ${{ vars.VITE_SQLWEBAPI_URL }}
      VITE_SQLWEBAPI_SERVICE: ${{ vars.VITE_SQLWEBAPI_SERVICE }}
      VITE_SERVICE: ${{ vars.VITE_SERVICE }}

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: ⚙️ Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🔨 Build static site
        run: npm run build:sqlwebapi

      - name: 📦 Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: 📡 Deploy SQLWebAPI site
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
